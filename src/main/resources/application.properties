quarkus.datasource.db-kind=postgresql

quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:admin}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/tekken_db}

quarkus.hibernate-orm.database.generation=none

quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=renegados-jwt

smallrye.jwt.sign.key.location=privateKey.pem

quarkus.native.resources.includes=publicKey.pem,privateKey.pem


quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.swagger-ui.always-include=true